name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rag-api:
    name: RAG API - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rag-api/package-lock.json
      - run: npm ci
        working-directory: rag-api
      - run: npm run build
        working-directory: rag-api
      - run: npm test
        working-directory: rag-api

  mcp-server:
    name: MCP Server - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
        working-directory: mcp-server
      - run: npm run build
        working-directory: mcp-server
      - run: npm test
        working-directory: mcp-server

  dashboard:
    name: Dashboard - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
